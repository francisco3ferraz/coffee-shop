name: CI

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  packages: write

env:
  GO_VERSION: "1.20"
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: francisco3ferraz/coffee-shop

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            currency/go.sum
            images-api/go.sum
            products-api/go.sum

      - name: Start local dependencies
        shell: bash
        run: |
          set -euo pipefail

          go run ./currency &
          CURRENCY_PID=$!

          cleanup() {
            kill "${PRODUCTS_PID:-}" "${CURRENCY_PID:-}" 2>/dev/null || true
          }
          trap cleanup EXIT

          wait_for_port() {
            local port="$1"

            for _ in {1..30}; do
              if timeout 1 bash -c "</dev/tcp/127.0.0.1/${port}" 2>/dev/null; then
                return 0
              fi
              sleep 1
            done

            return 1
          }

          wait_for_port 9092

          go run ./products-api &
          PRODUCTS_PID=$!

          wait_for_port 9090

          make test

  images:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: currency
            dockerfile: currency/Dockerfile
            image: currency
          - name: images-api
            dockerfile: images-api/Dockerfile
            image: images-api
          - name: products-api
            dockerfile: products-api/Dockerfile
            image: products-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service.image }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.image }}

services:
  currency:
    build:
      context: .
      dockerfile: currency/Dockerfile
    image: coffee-shop-currency:local
    environment:
      CURRENCY_BIND_ADDR: ":9092"
    ports:
      - "9092:9092"

  products-api:
    build:
      context: .
      dockerfile: products-api/Dockerfile
    image: coffee-shop-products-api:local
    environment:
      PRODUCTS_BIND_ADDR: "0.0.0.0:9090"
      CURRENCY_ADDR: "currency:9092"
    ports:
      - "9090:9090"
    depends_on:
      - currency

  images-api:
    build:
      context: .
      dockerfile: images-api/Dockerfile
    image: coffee-shop-images-api:local
    environment:
      IMAGES_BIND_ADDR: "0.0.0.0:9091"
      IMAGE_STORE_PATH: "/imagestore"
    ports:
      - "9091:9091"
    volumes:
      - images-data:/imagestore

volumes:
  images-data:


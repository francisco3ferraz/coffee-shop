apiVersion: apps/v1
kind: Deployment
metadata:
  name: products-api
  namespace: coffee-shop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: products-api
  template:
    metadata:
      labels:
        app: products-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      containers:
        - name: products-api
          image: ghcr.io/francisco3ferraz/coffee-shop/products-api:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 9090
          env:
            - name: PRODUCTS_BIND_ADDR
              valueFrom:
                configMapKeyRef:
                  name: coffee-shop-config
                  key: PRODUCTS_BIND_ADDR
            - name: CURRENCY_ADDR
              valueFrom:
                configMapKeyRef:
                  name: coffee-shop-config
                  key: CURRENCY_ADDR
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: images-api
  namespace: coffee-shop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: images-api
  template:
    metadata:
      labels:
        app: images-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: images-api
          image: ghcr.io/francisco3ferraz/coffee-shop/images-api:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 9091
          env:
            - name: IMAGES_BIND_ADDR
              valueFrom:
                configMapKeyRef:
                  name: coffee-shop-config
                  key: IMAGES_BIND_ADDR
            - name: IMAGE_STORE_PATH
              valueFrom:
                configMapKeyRef:
                  name: coffee-shop-config
                  key: IMAGE_STORE_PATH
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: image-store
              mountPath: /imagestore
      volumes:
        - name: image-store
          emptyDir: {}
---
